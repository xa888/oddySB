[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Forward all API traffic to the Netlify function
[[redirects]]
  from = "/health"
  to   = "/.netlify/functions/api"
  status = 200
  force  = true

[[redirects]]
  from = "/v1/*"
  to   = "/.netlify/functions/api"
  status = 200
  force  = true
