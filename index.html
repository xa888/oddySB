function sr(seed){const x=Math.sin(seed+1)*10000;return x-Math.floor(x);}
function buildActivity(addr){
  const s=addr.length*17;
  const types=["BUY","SELL","RECEIVE","SEND","BUY","BUY","RECEIVE","SELL","SEND","BUY","RECEIVE","SELL","SELL","SEND","BUY","SELL"];
  const mins=[2,6,11,19,28,41,55,68,87,106,132,158,192,225,261,290];
  const tradeRows=types.map((type,i)=>{
    const r=n=>sr(s*31+i*13+n);
    const tok=OUTCOME_TOKENS[Math.floor(r(1)*OUTCOME_TOKENS.length)];
    const peer=PEER_WALLETS[Math.floor(r(2)*PEER_WALLETS.length)];
    const qty=Math.floor(r(3)*12000+800),price=+(r(4)*0.78+0.10).toFixed(3),value=Math.floor(qty*price);
    const pos=r(6)>0.38;
    const pnlAmt=type==="SELL"?Math.floor(r(7)*3200+80):null;
    const pnlPctVal=type==="SELL"?Math.floor(r(8)*180+10):null;
    const pnl=type==="SELL"?(pos?"+":"-")+"$"+pnlAmt.toLocaleString():null;
    const pnlPct=type==="SELL"?(pos?pnlPctVal:-pnlPctVal):null;
    const hash=Array.from({length:8},(_,k)=>"0123456789abcdef"[Math.floor(r(8+k)*16)]).join("");
    return{type,tok,peer,qty,price,value,pnl,pnlPct,pnlPos:pos,minsAgo:mins[i],hash:`0x${hash}...${hash.slice(-4)}`,isLP:false};
  });
  const lpTypes=["LP_ADD","LP_CLAIM","LP_ADD","LP_REMOVE","LP_CLAIM"];
  const lpMins=[35,72,140,210,310];
  const lpRows=lpTypes.map((type,i)=>{
    const r=n=>sr(s*71+i*29+n);
    const tok=OUTCOME_TOKENS[Math.floor(r(1)*OUTCOME_TOKENS.length)];
    const lpVol=Math.floor(r(2)*48000+2000);
    const lpFee=type==="LP_CLAIM"?+(r(3)*420+12).toFixed(2):null;
    const lpRoi=type==="LP_CLAIM"?Math.floor(r(4)*340+40):null;
    const hash=Array.from({length:8},(_,k)=>"0123456789abcdef"[Math.floor(r(8+k)*16)]).join("");
    return{type,tok,peer:null,qty:lpVol,price:null,value:lpVol,pnl:lpFee?"+$"+lpFee.toFixed(2):null,pnlPct:lpRoi,pnlPos:true,minsAgo:lpMins[i],hash:`0x${hash}...${hash.slice(-4)}`,isLP:true,lpFee,lpRoi};
  });
  return [...tradeRows,...lpRows].sort((a,b)=>a.minsAgo-b.minsAgo);
}

function genLB(pid,tid){
  const m={"1d":0.015,"7d":0.09,"30d":0.55,"90d":1.4,"180d":2.5,"365d":4.2,"all":7.0}[tid]||1;
  const rows=LB_DATA
    .filter(r=>pid==="polymarket"?true:r.platform===pid||Math.random()>0.4)
    .map((r,i)=>{const s=(r.handle.length*31+i*17+r.totalPos)%999,j=0.88+(s%24)/100;return{...r,
      totalBuy:Math.round(r.totalBuy*m*j),totalSell:Math.round(r.totalSell*m*j),
      realizedPnl:Math.round(r.realizedPnl*m*j),avgBuySize:Math.round(r.avgBuySize*m*j),
      totalPos:Math.max(1,Math.round(r.totalPos*Math.min(1,m*1.8))),
      pnlPct:+(r.pnlPct*(0.9+(s%20)/100)).toFixed(1),avgPct:+(r.avgPct*(0.9+(s%20)/100)).toFixed(1),rank:0};})
    .filter(r=>r.realizedPnl>0);
  rows.sort((a,b)=>b.realizedPnl-a.realizedPnl);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}

function fu(v){const a=Math.abs(v);if(a>=1e6)return(v<0?"-":"")+"$"+(a/1e6).toFixed(2)+"M";if(a>=1000)return(v<0?"-":"")+"$"+(a/1e3).toFixed(1)+"K";return(v<0?"-$":"$")+a.toLocaleString();}
function fp(v){return(v>=0?"+":"")+v.toFixed(1)+"%";}

// ─── TOKEN FLOW GRAPH ─────────────────────────────────────────────────────────
function FlowGraph({graph}){
  const containerRef=useRef(null);
  const [lines,setLines]=useState([]);
  const nodeRefs=useRef({});
  const root=graph.root, mids=graph.children||[], leafEntries=[];
  mids.forEach((mid,mi)=>(mid.children||[]).forEach(leaf=>leafEntries.push({leaf,mi})));
  useEffect(()=>{
    if(!containerRef.current)return;
    const base=containerRef.current.getBoundingClientRect();
    const mid=el=>{const r=el.getBoundingClientRect();return{x:r.left-base.left,y:r.top-base.top,w:r.width,h:r.height};};
    const newLines=[];
    const rootEl=nodeRefs.current["root"];
    if(!rootEl)return;
    const rr=mid(rootEl);
    mids.forEach((_,mi)=>{
      const mEl=nodeRefs.current[`m${mi}`];if(!mEl)return;
      const mr=mid(mEl);
      const x1=rr.x+rr.w,y1=rr.y+rr.h/2,x2=mr.x,y2=mr.y+mr.h/2;
      const cx1=x1+(x2-x1)*0.55,cy1=y1,cx2=x1+(x2-x1)*0.45,cy2=y2;
      newLines.push({d:`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`,color:`${C.gold}90`,dashed:false});
    });
    leafEntries.forEach(({leaf,mi},li)=>{
      const mEl=nodeRefs.current[`m${mi}`],lEl=nodeRefs.current[`l${li}`];if(!mEl||!lEl)return;
      const mr=mid(mEl),lr=mid(lEl);
      const x1=mr.x+mr.w,y1=mr.y+mr.h/2,x2=lr.x,y2=lr.y+lr.h/2;
      const cx1=x1+(x2-x1)*0.55,cy1=y1,cx2=x1+(x2-x1)*0.45,cy2=y2;
      const col=leaf.side==="BUY"?C.green:C.red;
      newLines.push({d:`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`,color:`${col}80`,dashed:true});
    });
    setLines(newLines);
  });

  function NodeCard({id,data,isRoot}){
    const sc=data.side==="BUY"?C.green:data.side==="SELL"?C.red:C.gold;
    const borderCol=isRoot?C.gold:data.side==="BUY"?`${C.green}55`:data.side==="SELL"?`${C.red}55`:C.border;
    const pnlPos=data.pnl?data.pnl.startsWith("+"):true;
    return(
      <div ref={el=>{nodeRefs.current[id]=el;}} style={{background:isRoot?`${C.gold}0e`:C.bgCardB,border:`1px solid ${borderCol}`,borderRadius:8,padding:"10px 13px",width:164,flexShrink:0,display:"flex",flexDirection:"column",boxShadow:isRoot?`0 0 18px ${C.gold}18`:"none"}}>
        <div style={{fontFamily:F.mono,fontSize:9.5,fontWeight:700,color:isRoot?C.gold:C.text,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isRoot?(data.label||data.addr):data.addr}</div>
        {isRoot?<div style={{fontFamily:F.mono,fontSize:8,color:C.textDim,letterSpacing:1}}>ROOT WALLET</div>:(
          <>
            <div style={{height:1,background:C.border,marginBottom:7}}/>
            <div style={{display:"flex",gap:10}}>
              <div><div style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.2,marginBottom:2}}>TXS</div><div style={{fontFamily:F.mono,fontSize:11,color:C.textSub,fontWeight:600}}>{data.txs}</div></div>
              <div><div style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.2,marginBottom:2}}>VOL</div><div style={{fontFamily:F.mono,fontSize:11,color:C.textSub,fontWeight:600}}>{data.vol}</div></div>
              <div style={{marginLeft:"auto"}}><div style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.2,marginBottom:2}}>SIDE</div><div style={{fontFamily:F.mono,fontSize:11,fontWeight:700,color:sc}}>{data.side}</div></div>
            </div>
            {data.pnl&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontFamily:F.mono,fontSize:9,fontWeight:700,color:pnlPos?C.green:C.red,background:pnlPos?C.greenDim:C.redDim,border:`1px solid ${pnlPos?C.green+"40":C.red+"40"}`,borderRadius:3,padding:"1px 6px",whiteSpace:"nowrap"}}>{data.pnl}</span>
              {data.pct&&<span style={{fontFamily:F.mono,fontSize:8.5,color:`${pnlPos?C.green:C.red}bb`}}>({data.pct})</span>}
            </div>}
          </>
        )}
      </div>
    );
  }
  function Col({children,label}){
    return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,flex:"none"}}>
      {label&&<div style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.8,textTransform:"uppercase",marginBottom:2}}>{label}</div>}
      {children}
    </div>);
  }
  return(
    <div ref={containerRef} style={{position:"relative",display:"flex",alignItems:"center",gap:48,padding:"16px 28px",width:"100%",height:"100%",boxSizing:"border-box",overflowX:"auto"}}>
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible",pointerEvents:"none"}}>
        {lines.map((ln,i)=>(<path key={i} d={ln.d} fill="none" stroke={ln.color} strokeWidth={1.5} strokeDasharray={ln.dashed?"5 4":"none"} opacity={0.75}/>))}
        {lines.map((ln,i)=>{const pts=ln.d.match(/M([\d.]+),([\d.]+)/);if(!pts)return null;return<circle key={`d${i}`} cx={parseFloat(pts[1])} cy={parseFloat(pts[2])} r={3} fill={ln.color} opacity={0.7}/>;})}
      </svg>
      <Col label="ROOT"><NodeCard id="root" data={root} isRoot/></Col>
      {mids.length>0&&<Col label="LINKED">{mids.map((mid,i)=><NodeCard key={i} id={`m${i}`} data={mid}/>)}</Col>}
      {leafEntries.length>0&&<Col label="DOWNSTREAM">{leafEntries.map(({leaf},i)=><NodeCard key={i} id={`l${i}`} data={leaf}/>)}</Col>}
    </div>
  );
}

// ─── ACTIVITY TAB ─────────────────────────────────────────────────────────────
const ACT_PER_PAGE=10;
function ActivityTab({wallet}){
  const [filter,setFilter]=useState("ALL");
  const [actPage,setActPage]=useState(1);
  const rows=wallet.activityOverride||buildActivity(wallet.address);
  const AMAP={
    BUY:      {c:C.green, bg:C.greenDim },
    SELL:     {c:C.red,   bg:C.redDim   },
    RECEIVE:  {c:C.blue,  bg:C.blueDim  },
    SEND:     {c:C.gold,  bg:C.goldDim  },
    LP_ADD:   {c:C.purple,bg:C.purpleDim},
    LP_REMOVE:{c:C.red,   bg:C.redDim   },
    LP_CLAIM: {c:C.green, bg:C.greenDim },
  };
  const isLPType=t=>t==="LP_ADD"||t==="LP_REMOVE"||t==="LP_CLAIM";
  const visible=filter==="ALL"?rows
    :filter==="LP"?rows.filter(r=>isLPType(r.type))
    :rows.filter(r=>r.type===filter);
  const counts={
    ALL:rows.length,
    BUY:rows.filter(r=>r.type==="BUY").length,
    SELL:rows.filter(r=>r.type==="SELL").length,
    RECEIVE:rows.filter(r=>r.type==="RECEIVE").length,
    SEND:rows.filter(r=>r.type==="SEND").length,
    LP:rows.filter(r=>isLPType(r.type)).length,
  };
  const actPages=Math.max(1,Math.ceil(visible.length/ACT_PER_PAGE));
  const pagedAct=visible.slice((actPage-1)*ACT_PER_PAGE,actPage*ACT_PER_PAGE);
  const totalVol=visible.reduce((s,r)=>s+r.value,0);
  const sellRows=visible.filter(r=>r.pnl&&!r.isLP);

          {Array.from({length:actPages},(_,i)=>i+1).filter(p=>p===1||p===actPages||Math.abs(p-actPage)<=1).reduce((acc,p,idx,arr)=>{if(idx>0&&p-arr[idx-1]>1)acc.push("…");acc.push(p);return acc;},[]).map((p,idx)=>

          )}
          <button onClick={()=>setActPage(p=>Math.min(actPages,p+1))} disabled={actPage===actPages} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${actPage===actPages?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:actPage===actPages?C.textMute:C.textSub,cursor:actPage===actPages?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(actPage<actPages)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=actPage===actPages?C.borderC:C.border}>›</button>
          <button onClick={()=>setActPage(actPages)} disabled={actPage===actPages} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${actPage===actPages?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:actPage===actPages?C.textMute:C.textSub,cursor:actPage===actPages?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(actPage<actPages)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=actPage===actPages?C.borderC:C.border}>»</button>
        </div>
        <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,flexShrink:0}}>Page {actPage} of {actPages}</span>
      </div>
    </div>
  );
}

          <button onClick={()=>setRwTabPage(rwTabPages)} disabled={rwTabPage===rwTabPages} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${rwTabPage===rwTabPages?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:rwTabPage===rwTabPages?C.textMute:C.textSub,cursor:rwTabPage===rwTabPages?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(rwTabPage<rwTabPages)e.currentTarget.style.borderColor=C.green+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=rwTabPage===rwTabPages?C.borderC:C.border}>»</button>
        </div>
        <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,flexShrink:0}}>Page {rwTabPage} of {rwTabPages}</span>
      </div>
    </div>
  );
}

// ─── POSITIONS TAB ────────────────────────────────────────────────────────────
const POS_PER_PAGE=8;
function PositionsTab({wallet}){
  const [sub,setSub]=useState("OPEN");
  const [posPage,setPosPage]=useState(1);
  const positions=wallet.positions||{open:[],closed:[]};
  const rows=sub==="OPEN"?positions.open:positions.closed;
  const posPages=Math.max(1,Math.ceil(rows.length/POS_PER_PAGE));
  const pagedPos=rows.slice((posPage-1)*POS_PER_PAGE,posPage*POS_PER_PAGE);
  const openPnl=(positions.open||[]).reduce((s,p)=>s+p.pnl,0);
  const closedPnl=(positions.closed||[]).reduce((s,p)=>s+p.pnl,0);
  const closedWins=(positions.closed||[]).filter(p=>p.won).length;
  const cols="3fr 56px 68px 68px 80px 100px 88px";
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",minHeight:0}}>
      {/* Sub-tab bar */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px",borderBottom:`1px solid ${C.border}`,background:C.bgCardB,height:42}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontFamily:F.mono,fontSize:8.5,color:C.textDim,letterSpacing:1}}>POSITIONS /</span>
          {[["OPEN",C.green],["CLOSED",C.red]].map(([label,color])=>{
            const isA=sub===label,count=label==="OPEN"?positions.open?.length||0:positions.closed?.length||0;
            return(<button key={label} onClick={()=>{setSub(label);setPosPage(1);}} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 11px",borderRadius:5,cursor:"pointer",border:"none",background:isA?`${color}12`:"transparent",outline:isA?`1px solid ${color}40`:"1px solid transparent",transition:"all .15s"}}>
              <span style={{width:5,height:5,borderRadius:"50%",flexShrink:0,background:isA?color:C.textDim,boxShadow:isA?`0 0 7px ${color}`:"none",transition:"all .2s"}}/>
              <span style={{fontFamily:F.mono,fontSize:9,fontWeight:700,letterSpacing:0.8,color:isA?color:C.textDim}}>{label}</span>
              <span style={{fontFamily:F.mono,fontSize:7.5,background:isA?`${color}20`:C.bgCardC,color:isA?color:C.textDim,border:`1px solid ${isA?color+"40":C.border}`,borderRadius:8,padding:"0 5px"}}>{count}</span>
            </button>);
          })}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {sub==="OPEN"&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontFamily:F.mono,fontSize:8,color:C.textDim,letterSpacing:1}}>UNREALISED</span><Pnl val={openPnl} pct={fp(Math.round(openPnl/Math.max(1,(positions.open||[]).reduce((s,p)=>s+p.size,0))*100))} size={11}/></div>}
          {sub==="CLOSED"&&<div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontFamily:F.mono,fontSize:8,color:C.textDim,letterSpacing:1}}>REALISED</span><Pnl val={closedPnl} pct={fp(Math.round(closedPnl/Math.max(1,(positions.closed||[]).reduce((s,p)=>s+p.size,0))*100))} size={11}/></div>
            <span style={{fontFamily:F.mono,fontSize:10}}><span style={{color:C.green,fontWeight:700}}>{closedWins}W</span><span style={{color:C.textDim}}> / </span><span style={{color:C.red,fontWeight:700}}>{(positions.closed?.length||0)-closedWins}L</span></span>
          </div>}
        </div>
      </div>
      {/* Col headers */}
      <div style={{flexShrink:0,display:"grid",gridTemplateColumns:cols,padding:"5px 18px",gap:8,borderBottom:`1px solid ${C.border}`}}>
        {(sub==="OPEN"?["MARKET","SIDE","SIZE","ENTRY","CURRENT","PNL","EXPIRY"]:["MARKET","SIDE","SIZE","ENTRY","EXIT","PNL","CLOSED"]).map(h=><span key={h} style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.2,textTransform:"uppercase"}}>{h}</span>)}
      </div>
      <div style={{overflowY:"auto",flex:1}}>
        {rows.length===0&&<div style={{padding:40,textAlign:"center",color:C.textDim,fontFamily:F.mono,fontSize:11}}>No {sub.toLowerCase()} positions</div>}
        {pagedPos.map((pos,i)=>{
          const isOpen=sub==="OPEN",ec=ECO_COLOR[pos.eco]||C.textDim,el=ECOSYSTEMS.find(e=>e.id===pos.eco)?.label||pos.eco,sp=pos.side==="YES"||pos.side==="BUY";
          const cPrice=isOpen?pos.current:pos.exit, pricePos=cPrice>=pos.entry;
          return(<div key={i} style={{display:"grid",gridTemplateColumns:cols,padding:"10px 18px",gap:8,alignItems:"center",borderBottom:`1px solid ${C.border}10`,transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background=`${ec}05`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{display:"flex",alignItems:"center",gap:9,minWidth:0}}>
              <div style={{minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span style={{fontFamily:F.body,fontSize:11.5,fontWeight:500,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pos.title}</span><Tag label={el} color={ec}/></div>
                <span style={{fontFamily:F.mono,fontSize:8,color:C.textDim}}>{pos.id}</span>
              </div>
            </div>
            <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",fontFamily:F.mono,fontSize:9.5,fontWeight:700,color:sp?C.green:C.red,background:sp?C.greenDim:C.redDim,border:`1px solid ${sp?C.green+"40":C.red+"40"}`,borderRadius:4,padding:"2px 7px"}}>{pos.side}</span>
            <span style={{fontFamily:F.mono,fontSize:10.5,color:C.textSub}}>${pos.size.toLocaleString()}</span>
            <span style={{fontFamily:F.mono,fontSize:10.5,color:C.textDim}}>${pos.entry.toFixed(2)}</span>
            <span style={{fontFamily:F.mono,fontSize:10.5,fontWeight:600,color:pricePos?C.green:C.red}}>${cPrice?.toFixed(2)}</span>
            <Pnl val={pos.pnl} pct={fp(pos.pnlPct)} size={11}/>
            <div>
              {isOpen?<div>
                <div style={{fontFamily:F.mono,fontSize:9.5,color:C.textSub,marginBottom:3}}>{pos.expiry}</div>
                {pos.confidence&&<div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:40,height:2,background:C.bgCardC,borderRadius:2,overflow:"hidden"}}><div style={{width:`${pos.confidence}%`,height:"100%",background:pos.confidence>=70?C.green:pos.confidence>=50?C.goldB:C.red,borderRadius:2}}/></div>
                  <span style={{fontFamily:F.mono,fontSize:8,color:C.textDim}}>{pos.confidence}%</span>
                </div>}
              </div>:<div>
                <div style={{fontFamily:F.mono,fontSize:9.5,color:C.textSub,marginBottom:3}}>{pos.closedAt}</div>
                <span style={{fontFamily:F.mono,fontSize:8.5,fontWeight:700,color:pos.won?C.green:C.red,background:pos.won?C.greenDim:C.redDim,border:`1px solid ${pos.won?C.green+"40":C.red+"40"}`,borderRadius:3,padding:"1px 6px"}}>{pos.won?"✓ WON":"✗ LOST"}</span>
              </div>}
            </div>
          </div>);
        })}
      </div>
      {/* Pagination footer */}
      <div style={{flexShrink:0,borderTop:`1px solid ${C.border}`,padding:"6px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:C.bgCardB,gap:12}}>
        <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,flexShrink:0}}>{rows.length} {sub.toLowerCase()} positions</span>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <button onClick={()=>setPosPage(1)} disabled={posPage===1} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${posPage===1?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:posPage===1?C.textMute:C.textSub,cursor:posPage===1?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(posPage>1)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=posPage===1?C.borderC:C.border}>«</button>
          <button onClick={()=>setPosPage(p=>Math.max(1,p-1))} disabled={posPage===1} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${posPage===1?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:posPage===1?C.textMute:C.textSub,cursor:posPage===1?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(posPage>1)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=posPage===1?C.borderC:C.border}>‹</button>
          {Array.from({length:posPages},(_,i)=>i+1).filter(p=>p===1||p===posPages||Math.abs(p-posPage)<=1).reduce((acc,p,idx,arr)=>{if(idx>0&&p-arr[idx-1]>1)acc.push("…");acc.push(p);return acc;},[]).map((p,idx)=>
            typeof p==="string"
              ?<span key={idx} style={{fontFamily:F.mono,fontSize:9,color:C.textMute,padding:"0 2px"}}>…</span>
              :<button key={p} onClick={()=>setPosPage(p)} style={{minWidth:26,padding:"3px 6px",borderRadius:4,border:`1px solid ${p===posPage?C.gold+"55":C.border}`,background:p===posPage?C.goldDim:"transparent",fontFamily:F.mono,fontSize:9,fontWeight:p===posPage?700:400,color:p===posPage?C.goldB:C.textSub,cursor:"pointer",transition:"all .15s"}}>{p}</button>
          )}
          <button onClick={()=>setPosPage(p=>Math.min(posPages,p+1))} disabled={posPage===posPages} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${posPage===posPages?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:posPage===posPages?C.textMute:C.textSub,cursor:posPage===posPages?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(posPage<posPages)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=posPage===posPages?C.borderC:C.border}>›</button>
          <button onClick={()=>setPosPage(posPages)} disabled={posPage===posPages} style={{padding:"3px 7px",borderRadius:4,border:`1px solid ${posPage===posPages?C.borderC:C.border}`,background:"transparent",fontFamily:F.mono,fontSize:9,color:posPage===posPages?C.textMute:C.textSub,cursor:posPage===posPages?"default":"pointer",transition:"all .15s"}} onMouseEnter={e=>{if(posPage<posPages)e.currentTarget.style.borderColor=C.gold+"55";}} onMouseLeave={e=>e.currentTarget.style.borderColor=posPage===posPages?C.borderC:C.border}>»</button>
        </div>
        <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,flexShrink:0}}>Page {posPage} of {posPages}</span>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({query,onBack}){
  const [tab,setTab]=useState("POSITIONS");
  const [selPlatform,setSelPlatform]=useState(null);
  const [ddOpen,setDdOpen]=useState(false);
  const [apiWallet,setApiWallet]=useState(null);
  useEffect(()=>{
    setApiWallet(null);
    const q=encodeURIComponent(query);
    Promise.allSettled([
      api(`/v1/wallet/${q}`),
      api(`/v1/wallet/${q}/positions?status=open&limit=20`),
      api(`/v1/wallet/${q}/positions?status=closed&limit=20`),
      api(`/v1/wallet/${q}/activity?limit=30`),
      api(`/v1/wallet/${q}/rewards`),
    ]).then(([prof,openP,closedP,act,rw])=>{
      const p=prof.status==="fulfilled"?prof.value:null;
      const op=openP.status==="fulfilled"&&openP.value?openP.value.positions:null;
      const cl=closedP.status==="fulfilled"&&closedP.value?closedP.value.positions:null;
      const ac=act.status==="fulfilled"&&act.value?act.value.activity?.map(actToRow):null;
      const rew=rw.status==="fulfilled"&&rw.value?rw.value.rewards:null;
      if(p||op||cl||ac||rew)setApiWallet({profile:p,positions:(op||cl)?{open:op||[],closed:cl||[]}:null,activityOverride:ac,rewards:rew});
    });
  },[query]);
  const sw=WALLETS[query]||WALLETS["0xA1b2c3d4e5f6789abc"];
  const ap=apiWallet?.profile;
  const wallet={
    ...sw,
    ...(ap?{
      handle:ap.handle||sw.handle,
      address:ap.address||sw.address,
      eco:ap.eco||sw.eco,
      winRate:ap.winRate>0?Math.round(ap.winRate):sw.winRate,
      riskScore:ap.riskScore>0?Math.round(ap.riskScore):sw.riskScore,
      volume:ap.volume>0?(ap.volume>=1e6?(ap.volume/1e6).toFixed(1)+"M":ap.volume>=1e3?(ap.volume/1e3).toFixed(0)+"K":String(Math.round(ap.volume))):sw.volume,
      pnl:ap.pnl!==0?Math.round(ap.pnl).toLocaleString():sw.pnl,
      pnlPct:ap.pnlPct!==0?Math.round(ap.pnlPct).toString():sw.pnlPct,
      tags:ap.tags?.length?ap.tags:sw.tags,
    }:{}),
    positions:apiWallet?.positions||sw.positions,
    activityOverride:apiWallet?.activityOverride,
    rewards:apiWallet?.rewards||sw.rewards,
  };
  const activePlatformId=selPlatform||wallet.eco;
  const ec=ECO_COLOR[activePlatformId]||C.gold;
  const eco=ECOSYSTEMS.find(e=>e.id===activePlatformId);

  const TABS=[
    {id:"POSITIONS",  label:"Positions",   badge:(wallet.positions?.open?.length||0)+(wallet.positions?.closed?.length||0), bc:C.gold},
    {id:"TOKEN FLOW", label:"Token Flow",  badge:null, bc:C.gold},
    {id:"REWARDS",    label:"Rewards",     badge:wallet.rewards?.length||0, bc:C.green},
    {id:"ACTIVITY",   label:"Activity",    badge:null, bc:C.gold},
  ];

  return(
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"18px 28px 0",flexShrink:0,background:`linear-gradient(180deg,${C.bgCardB},${C.bg})`,position:"relative",zIndex:10}}>
        <button onClick={onBack} style={{display:"inline-flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",color:C.textDim,fontFamily:F.mono,fontSize:8.5,letterSpacing:1,marginBottom:16,padding:0,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color=C.goldB} onMouseLeave={e=>e.currentTarget.style.color=C.textDim}>← BACK TO LEADERBOARD</button>

        {/* Hero card */}
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:16,position:"relative"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${ec}60,transparent)`,transition:"background .3s"}}/>
          <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(180deg,${ec},${ec}18)`,transition:"background .3s"}}/>
          <div style={{position:"absolute",top:-30,right:-30,width:220,height:160,background:`radial-gradient(ellipse,${ec}10 0%,transparent 70%)`,pointerEvents:"none",transition:"background .3s"}}/>
          <div style={{padding:"20px 24px 20px 28px",display:"flex",alignItems:"center",gap:20,position:"relative"}}>
            <div style={{width:58,height:58,borderRadius:13,flexShrink:0,background:`${ec}16`,border:`1.5px solid ${ec}35`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.display,fontWeight:900,fontSize:22,color:ec,boxShadow:`0 4px 22px ${ec}20`,transition:"all .3s"}}>{wallet.handle[1]?.toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontFamily:F.display,fontWeight:900,fontSize:20,color:C.text,letterSpacing:-0.3}}>{wallet.handle}</span>
                {wallet.tags.map(tag=><Tag key={tag} label={tag} color={tag==="WHALE"?C.blue:tag==="DeFi"?C.purple:C.gold}/>)}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:F.mono,fontSize:9,color:C.textDim}}>{wallet.address}</span>
                <span style={{color:C.textMute}}>·</span>
                {/* Platform dropdown */}
                <div style={{position:"relative"}}>
                  <button
                    onClick={()=>setDdOpen(o=>!o)}
                    onBlur={()=>setTimeout(()=>setDdOpen(false),120)}
                    style={{display:"inline-flex",alignItems:"center",gap:5,background:ddOpen?`${ec}14`:`${ec}0a`,border:`1px solid ${ddOpen?ec+"55":ec+"28"}`,borderRadius:5,padding:"3px 8px 3px 7px",cursor:"pointer",transition:"all .15s",outline:"none"}}
                  >
                    <span style={{width:5,height:5,borderRadius:"50%",background:ec,boxShadow:`0 0 5px ${ec}`,flexShrink:0,transition:"background .3s"}}/>
                    <span style={{fontFamily:F.mono,fontSize:8.5,color:ec,fontWeight:700,letterSpacing:0.3,transition:"color .3s"}}>{eco?.label}</span>
                    <span style={{fontFamily:F.mono,fontSize:7.5,color:ec+"99",marginLeft:1,transition:"color .3s"}}>{eco?.chain}</span>
                    <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style={{marginLeft:2,flexShrink:0,transform:ddOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}><path d="M1 2.5L4 5.5L7 2.5" stroke={ec} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                  {ddOpen&&(
                    <div style={{position:"absolute",top:"calc(100% + 5px)",left:0,zIndex:999,background:C.bgCardB,border:`1px solid ${C.borderB}`,borderRadius:8,padding:"4px",minWidth:160,boxShadow:`0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px ${C.border}`}}>
                      <div style={{fontFamily:F.mono,fontSize:7,color:C.textDim,letterSpacing:1.5,padding:"4px 8px 6px",textTransform:"uppercase"}}>Switch Platform</div>

                        const isActive=e.id===activePlatformId;

                            {isDefault&&<span style={{fontFamily:F.mono,fontSize:6.5,color:e.color,background:`${e.color}15`,border:`1px solid ${e.color}30`,borderRadius:3,padding:"1px 4px",letterSpacing:0.5,flexShrink:0}}>DEFAULT</span>}
                            {isActive&&!isDefault&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.2 7.2L8 3" stroke={e.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}

                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:0,flexShrink:0}}>
              {[{l:"Volume",v:"$"+wallet.volume,c:null},{l:"Win Rate",v:wallet.winRate+"%",c:wallet.winRate>=70?C.green:C.goldB},{l:"PnL",v:`+$${wallet.pnl}`,c:C.green},{l:"P&L %",v:"+"+wallet.pnlPct+"%",c:C.green}].map((s,i)=>(
                <div key={i} style={{padding:"0 18px",borderLeft:i>0?`1px solid ${C.border}`:"none",textAlign:"right"}}>
                  <div style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{s.l}</div>
                  <div style={{fontFamily:F.display,fontWeight:800,fontSize:17,color:s.c||C.text,lineHeight:1,textShadow:s.c?`0 0 16px ${s.c}25`:"none"}}>{s.v}</div>

        </div>

        {/* Tab bar */}
        <div style={{display:"flex",alignItems:"stretch",borderBottom:`1px solid ${C.border}`,paddingLeft:2}}>
          {TABS.map(t=>{

              {t.label}
              {t.badge!==null&&<span style={{fontFamily:F.mono,fontSize:7.5,background:active?`${t.bc}20`:C.bgCardC,color:active?t.bc:C.textDim,border:`1px solid ${active?t.bc+"40":C.border}`,borderRadius:8,padding:"1px 6px"}}>{t.badge}</span>}
            </button>);
          })}
        </div>
      </div>

      {/* Tab content */}
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:"14px 28px 24px",overflow:"hidden"}}>
        {tab==="POSITIONS"  && <PositionsTab wallet={wallet}/>}
        {tab==="TOKEN FLOW" && <TokenFlowTab wallet={wallet}/>}
        {tab==="REWARDS"    && <RewardsTab   wallet={wallet}/>}
        {tab==="ACTIVITY"   && <ActivityTab  wallet={wallet}/>}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("HOME");
  const [query,setQuery]=useState("");
  function go(q,dest){if(dest==="LEADERBOARD"){setPage("LEADERBOARD");return;}if(q){setQuery(q);setPage("PROFILE");}}
  return(
    <>
      <style>{`
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;background:${C.bgDeep};overflow:hidden;}
        #root{height:100%;display:flex;flex-direction:column;}
        ::selection{background:${C.goldDim};color:${C.text};}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:3px;}
        ::-webkit-scrollbar-thumb:hover{background:${C.borderB};}
        input::placeholder{color:${C.textMute};}
        button{transition:all .15s;cursor:pointer;}
        button:active{transform:scale(0.97);}
        @keyframes blip{0%,100%{opacity:1;}50%{opacity:0.25;}}
        @keyframes ping{0%{transform:scale(1);opacity:0.55;}100%{transform:scale(2.4);opacity:0;}}
        @keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-33.33%);}}
      `}</style>
      <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <TopNav page={page} setPage={setPage} onAnalyze={go}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {page==="HOME"        &&<HomePage        onAnalyze={go}/>}
          {page==="LEADERBOARD" &&<LeaderboardPage onAnalyze={go}/>}
          {page==="PROFILE"     &&<ProfilePage     query={query} onBack={()=>setPage("LEADERBOARD")}/>}
        </div>
        <div style={{flexShrink:0,height:26,display:"flex",alignItems:"center",padding:"0 28px",borderTop:`1px solid ${C.border}`,justifyContent:"space-between",background:C.bgDeep}}>
          <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim}}>© 2026 ODDY.AI</span>
          <span style={{fontFamily:F.mono,fontSize:7.5,color:C.textDim}}>ERC-20 token flow · 6 prediction market ecosystems</span>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
